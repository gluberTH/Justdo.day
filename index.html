<body class="bg-[#FCFBF9] text-black font-sans antialiased min-h-screen flex flex-col items-center">

    <!-- App Container -->
    <main id="app-container" class="w-full max-w-xl px-6 py-12 sm:py-24 flex-grow flex flex-col">
        
        <!-- Onboarding Screen -->
        <section id="onboarding-screen" class="hidden flex-grow flex flex-col items-center justify-center text-center transition-opacity duration-500">
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-12 leading-tight">What will you do<br>every day?</h1>
            
            <div id="habit-inputs-container" class="w-full space-y-4 mb-8">
                <input type="text" id="habit-input" placeholder="e.g. Read 10 pages" class="w-full text-2xl sm:text-3xl border-b-2 border-black/20 focus:border-black outline-none py-2 px-1 text-center placeholder-gray-300 transition-colors bg-transparent" autocomplete="off" maxlength="40">
            </div>

            <div class="flex flex-col items-center w-full">
                <button id="add-habit-btn" class="text-lg font-semibold border-2 border-black px-8 py-3 rounded-full hover:bg-black hover:text-white transition-colors duration-200 mb-4 w-full sm:w-auto">
                    Add
                </button>
                <p id="habits-counter" class="text-gray-400 text-sm font-medium uppercase tracking-wider">Added 0 of 3</p>
                
                <div id="temp-habits-list" class="mt-10 text-left w-full space-y-4 hidden">
                    <!-- Temporary list of added habits -->
                </div>
                
                <button id="start-btn" class="hidden mt-12 text-xl font-bold bg-accent text-white px-10 py-4 rounded-full shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-200 w-full sm:w-auto">
                    Start the chain
                </button>
            </div>
        </section>

        <!-- Main Screen -->
        <section id="main-screen" class="hidden flex-grow flex flex-col mt-8">
            <!-- Header -->
